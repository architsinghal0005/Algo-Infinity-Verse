<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSA Assessments | Algo Infinity Verse</title>
    <meta name="description" content="Test your knowledge with our centralized, scalable DSA quiz system." />
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- External Stylesheets -->
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="quiz-system.css" />
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">
            <span class="logo-text">∞</span>
            <span class="logo-title">Algo Infinity Verse</span>
        </div>
        <ul class="nav-links" id="navLinks">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="#" class="nav-link active" style="color: var(--quiz-primary);">Assessments</a></li>
            <li class="nav-item"><a href="index.html#practice" class="nav-link">Practice</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero quiz-hero">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="title-line">Test Your Knowledge</span>
                <span class="main-title gradient-text-quiz">DSA Assessments</span>
                <span class="subtitle">
                    Select a module to evaluate your algorithmic problem-solving skills.
                </span>
            </h1>
        </div>
    </section>

    <!-- Main Quiz Area -->
    <section class="section">
        <div class="container">
            
            <!-- View 1: Category Selection -->
            <div id="view-categories" class="quiz-view active">
                <h3 class="section-heading"><i class="fas fa-layer-group"></i> Select a Module</h3>
                <div class="category-grid" id="categoryGrid">
                    <!-- Injected by JS Controller -->
                </div>
            </div>

            <!-- View 2: Active Quiz -->
            <div id="view-active-quiz" class="quiz-view hidden">
                <div class="quiz-header">
                    <button class="btn-exit" id="btnExitQuiz"><i class="fas fa-times"></i> Exit</button>
                    <div class="quiz-progress-container">
                        <div class="progress-text">
                            <span id="quizTopicLabel">Topic</span>
                            <span id="quizProgressLabel">Question 1 of 5</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="quizProgressBar"></div>
                        </div>
                    </div>
                </div>

                <div class="question-container">
                    <h2 class="question-text" id="questionText">Question goes here?</h2>
                    
                    <div class="options-grid" id="optionsGrid">
                        <!-- Options injected by JS -->
                    </div>

                    <div class="quiz-controls">
                        <div class="feedback-msg" id="feedbackMsg"></div>
                        <button class="btn-next" id="btnNextQuestion" disabled>Next <i class="fas fa-arrow-right"></i></button>
                    </div>
                </div>
            </div>

            <!-- View 3: Quiz Results -->
            <div id="view-results" class="quiz-view hidden">
                <div class="results-container">
                    <i class="fas fa-trophy results-icon"></i>
                    <h2 class="results-title">Assessment Complete!</h2>
                    
                    <div class="score-display">
                        <span class="score-number" id="finalScoreDisplay">0%</span>
                    </div>
                    
                    <p class="results-message" id="resultsMessage">Great job completing the module.</p>
                    
                    <div class="results-actions">
                        <button class="btn-restart" id="btnRestartQuiz"><i class="fas fa-redo"></i> Retry Module</button>
                        <button class="btn-return" id="btnReturnHome"><i class="fas fa-home"></i> Back to Categories</button>
                    </div>
                </div>
            </div>

        </div>
    </section>
    
    <!-- External Scripts -->
    <script src="script.js"></script>
    <script src="quiz-system.js"></script>
</body>
</html>
